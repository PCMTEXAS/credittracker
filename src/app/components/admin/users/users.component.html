<div>
  <h2 class="fw-bold mb-1">Users</h2>
  <p class="text-muted mb-4">Active users in the system</p>

  @if (loading()) {
    <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
  } @else {
    <div class="card">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>User ID</th><th>Name</th><th>Role</th><th>Job Title</th><th>Department</th><th>Email</th></tr>
          </thead>
          <tbody>
            @for (u of users(); track u.user_id) {
              <tr>
                <td class="font-monospace text-muted small">{{ u.user_id }}</td>
                <td class="fw-semibold">{{ u.name ?? '—' }}</td>
                <td><span class="badge" [class.bg-danger]="u.role === 'admin'" [class.bg-warning]="u.role === 'manager'" [class.bg-primary]="u.role === 'reporter'">{{ u.role }}</span></td>
                <td>{{ u.job_title ?? '—' }}</td>
                <td>{{ u.department ?? '—' }}</td>
                <td class="text-muted small">{{ u.email ?? '—' }}</td>
              </tr>
            } @empty {
              <tr><td colspan="6" class="text-center text-muted py-4">No users found</td></tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  }
</div>
