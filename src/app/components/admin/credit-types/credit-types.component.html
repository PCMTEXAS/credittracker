<div>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-0">Credit Types</h2>
      <p class="text-muted mb-0">Manage CE credit categories</p>
    </div>
    <button class="btn btn-primary" (click)="startNew()">➕ Add Credit Type</button>
  </div>

  @if (editing()) {
    <div class="card mb-4 border-primary">
      <div class="card-header bg-primary text-white fw-semibold">
        {{ editing()?.id ? 'Edit' : 'New' }} Credit Type
      </div>
      <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="row g-3">
            <div class="col-12 col-md-5">
              <label for="ctName" class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
              <input id="ctName" type="text" class="form-control" formControlName="name"
                [class.is-invalid]="form.controls.name.invalid && form.controls.name.touched">
              <div class="invalid-feedback">Name is required</div>
            </div>
            <div class="col-12 col-md-5">
              <label for="ctDesc" class="form-label fw-semibold">Description</label>
              <input id="ctDesc" type="text" class="form-control" formControlName="description">
            </div>
            <div class="col-12 col-md-2">
              <label for="ctColor" class="form-label fw-semibold">Color</label>
              <input id="ctColor" type="color" class="form-control form-control-color w-100" formControlName="color">
            </div>
          </div>
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary" [disabled]="saving()">
              @if (saving()) { <span class="spinner-border spinner-border-sm me-1"></span> }
              Save
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="cancelEdit()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  }

  @if (loading()) {
    <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
  } @else {
    <div class="card">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>Color</th><th>Name</th><th>Description</th><th></th></tr>
          </thead>
          <tbody>
            @for (ct of creditTypes(); track ct.id) {
              <tr>
                <td><div class="rounded" [style.background]="ct.color" style="width:28px;height:28px"></div></td>
                <td class="fw-semibold">{{ ct.name }}</td>
                <td class="text-muted">{{ ct.description }}</td>
                <td class="text-end">
                  <button class="btn btn-sm btn-outline-primary me-2" (click)="startEdit(ct)">✏️ Edit</button>
                  <button class="btn btn-sm btn-outline-danger" (click)="delete(ct.id)">🗑 Delete</button>
                </td>
              </tr>
            } @empty {
              <tr><td colspan="4" class="text-center text-muted py-4">No credit types yet</td></tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  }
</div>
