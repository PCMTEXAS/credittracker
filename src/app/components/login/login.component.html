<div class="min-vh-100 d-flex align-items-center justify-content-center bg-body-secondary">
  <div class="card shadow" style="width:400px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="fs-1 mb-2">🎓</div>
        <h3 class="fw-bold text-primary mb-1">CE Credit Tracker</h3>
        <p class="text-muted small">Track your continuing education progress</p>
      </div>
      @if (error()) {
        <div class="alert alert-danger py-2">{{ error() }}</div>
      }
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="userId" class="form-label fw-semibold">User ID</label>
          <input id="userId" type="text" class="form-control" formControlName="userId"
            [class.is-invalid]="form.controls.userId.invalid && form.controls.userId.touched"
            placeholder="Enter your user ID" autocomplete="username">
          <div class="invalid-feedback">User ID is required</div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input id="password" type="password" class="form-control" formControlName="password"
            [class.is-invalid]="form.controls.password.invalid && form.controls.password.touched"
            placeholder="Enter your password" autocomplete="current-password">
          <div class="invalid-feedback">Password is required</div>
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
          } @else {
            Sign In
          }
        </button>
      </form>
    </div>
  </div>
</div>
