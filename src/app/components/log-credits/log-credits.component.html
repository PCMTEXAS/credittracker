<div class="container-fluid px-0" style="max-width:640px">
  <h2 class="fw-bold mb-1">Log CE Credits</h2>
  <p class="text-muted mb-4">Record a new continuing education activity</p>

  @if (success()) {
    <div class="alert alert-success alert-dismissible">
      ✅ Credits logged successfully!
      <button type="button" class="btn-close" (click)="success.set(false)"></button>
    </div>
  }
  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  <div class="card">
    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="creditType" class="form-label fw-semibold">Credit Type <span class="text-danger">*</span></label>
          <select id="creditType" class="form-select" formControlName="credit_type_id"
            [class.is-invalid]="form.controls.credit_type_id.invalid && form.controls.credit_type_id.touched">
            <option value="">Select credit type...</option>
            @for (ct of creditTypes(); track ct.id) {
              <option [value]="ct.id">{{ ct.name }}</option>
            }
          </select>
          <div class="invalid-feedback">Please select a credit type</div>
        </div>

        <div class="mb-3">
          <label for="courseName" class="form-label fw-semibold">Course / Activity Name <span class="text-danger">*</span></label>
          <input id="courseName" type="text" class="form-control" formControlName="course_name"
            [class.is-invalid]="form.controls.course_name.invalid && form.controls.course_name.touched"
            placeholder="e.g. OSHA 10-Hour Safety Training">
          <div class="invalid-feedback">Course name is required</div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-6">
            <label for="amount" class="form-label fw-semibold">Credits Earned <span class="text-danger">*</span></label>
            <input id="amount" type="number" step="0.25" min="0.01" class="form-control" formControlName="amount"
              [class.is-invalid]="form.controls.amount.invalid && form.controls.amount.touched"
              placeholder="e.g. 1.5">
            <div class="invalid-feedback">Enter a valid credit amount</div>
          </div>
          <div class="col-6">
            <label for="earnedDate" class="form-label fw-semibold">Date Completed <span class="text-danger">*</span></label>
            <input id="earnedDate" type="date" class="form-control" formControlName="earned_date"
              [class.is-invalid]="form.controls.earned_date.invalid && form.controls.earned_date.touched">
            <div class="invalid-feedback">Date is required</div>
          </div>
        </div>

        <div class="mb-3">
          <label for="source" class="form-label fw-semibold">Source</label>
          <select id="source" class="form-select" formControlName="source">
            <option value="manual">Manual Entry</option>
            <option value="course">DigitalChalk Course</option>
            <option value="external">External Provider</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="notes" class="form-label fw-semibold">Notes <span class="text-muted">(optional)</span></label>
          <textarea id="notes" class="form-control" formControlName="notes" rows="2"
            placeholder="Any additional notes..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary px-4" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>Saving...
          } @else {
            ➕ Log Credits
          }
        </button>
      </form>
    </div>
  </div>
</div>
